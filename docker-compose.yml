services:
  app:
    build: .
    image: otg-audit:latest
    restart: unless-stopped
    environment:
      WEB_CONCURRENCY: "2"
    expose:
      - "8000"
    networks:
      - edge

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env (e.g. otg.example.org)}
      ACME_EMAIL: ${ACME_EMAIL:-admin@${DOMAIN}}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
