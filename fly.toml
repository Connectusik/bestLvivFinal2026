app = "otg-audit"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  WEB_CONCURRENCY = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 8
    hard_limit = 16

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
